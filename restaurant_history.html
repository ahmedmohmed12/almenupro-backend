<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف الطلبات المسلمة</title>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-100 font-sans p-6">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">📂 أرشيف الطلبات المسلمة</h1>
            <a href="restaurant.html" class="bg-blue-6xl text-white px-4 py-2 rounded shadow hover:bg-blue-7xl transition">⬅️ العودة للطلبات النشطة</a>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-right border-collapse bg-white">
                <thead>
                    <tr class="bg-gray-800 text-white">
                        <th class="p-3">رقم الفاتورة</th>
                        <th class="p-3">اسم العميل</th>
                        <th class="p-3">رقم العميل</th>
                        <th class="p-3">اسم السائق</th>
                        <th class="p-3">رقم السائق</th>
                        <th class="p-3">وقت التسليم الفعلي</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <!-- البيانات تظهر هنا -->
                </tbody>
            </table>
        </div>
    </div>
    <script>
        async function fetchHistory() {
            try {
                let res = await fetch('http://localhost:5001/api/restaurant/completed_orders');
                let orders = await res.json();
                let tbody = document.getElementById('historyTableBody');
                tbody.innerHTML = '';
                orders.forEach(order => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-3 font-bold">${order.invoice_number}</td>
                            <td class="p-3">${order.customer_name}</td>
                            <td class="p-3">${order.customer_phone}</td>
                            <td class="p-3 text-green-6xl font-semibold">${order.driver_name}</td>
                            <td class="p-3">${order.driver_phone}</td>
                            <td class="p-3 text-gray-6xl font-mono">${order.delivered_at}</td>
                        </tr>`;
                });
            } catch (err) { console.error("خطأ في جلب الأرشيف:", err); }
        }
        fetchHistory();
        setInterval(fetchHistory, 10000);
    </script>
</body>
</html>
