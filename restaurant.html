<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restaurant — Orders Dashboard</title>
  <style>
    :root {
      --bg: #f8fafc;
      --sidebar: #0f172a;
      --card: #ffffff;
      --accent: #0ea5e9;
      --accent-dark: #0284c7;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --success: #16a34a;
      --whatsapp: #25d366;
      --whatsapp-hover: #1da851;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
    }

    aside {
      background: var(--sidebar);
      color: #e2e8f0;
      padding: 2rem 1.5rem;
    }

    aside h1 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    aside p {
      font-size: 0.8rem;
      color: #94a3b8;
      line-height: 1.4;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1.5rem;
      padding: 0.4rem 0.75rem;
      background: rgba(34, 197, 94, 0.15);
      border-radius: 999px;
      font-size: 0.75rem;
      color: #86efac;
    }

    .status-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    main {
      padding: 2rem 2.5rem;
      overflow-x: auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .topbar h2 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .topbar .meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .stats {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.65rem 1rem;
      box-shadow: var(--shadow);
      min-width: 100px;
    }

    .stat strong {
      display: block;
      font-size: 1.35rem;
      color: var(--accent-dark);
    }

    .stat span {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead {
      background: #f1f5f9;
      border-bottom: 1px solid var(--border);
    }

    th {
      text-align: left;
      padding: 0.85rem 1rem;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      white-space: nowrap;
    }

    td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:hover { background: #f8fafc; }
    tbody tr:last-child td { border-bottom: none; }

    .invoice-cell {
      font-weight: 600;
      font-family: ui-monospace, monospace;
      color: var(--accent-dark);
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: capitalize;
      background: #e0f2fe;
      color: #0369a1;
    }

    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.85rem;
      background: var(--whatsapp);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-wa:hover { background: var(--whatsapp-hover); }
    .btn-wa:disabled,
    .btn-wa.disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      pointer-events: none;
    }

    .empty {
      padding: 3rem 1rem;
      text-align: center;
      color: var(--muted);
    }

    .error-banner {
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 10px;
      font-size: 0.9rem;
    }

    .error-banner.hidden { display: none; }

    .api-foot {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      aside { padding: 1.25rem; }
      main { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1>Restaurant Admin</h1>
      <p>Live orders from drivers. Refreshes every 10 seconds.</p>
      <div class="status-pill">
        <span class="dot"></span>
        <span id="live-label">Live</span>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div>
          <h2>Orders</h2>
          <p class="meta">Last updated: <span id="last-updated">—</span></p>
        </div>
        <div class="stats">
          <div class="stat">
            <strong id="order-count">0</strong>
            <span>Total orders</span>
          </div>
        </div>
      </div>

      <div id="error-banner" class="error-banner hidden" role="alert"></div>

      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Invoice #</th>
                <th>Customer Name</th>
                <th>Customer Phone</th>
                <th>Driver Name</th>
                <th>Driver Phone</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="orders-body">
              <tr>
                <td colspan="6" class="empty">Loading orders…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <p class="api-foot" id="api-foot"></p>
    </main>
  </div>

  <script>
    const POLL_MS = 10_000;

    let API_BASE = "";

    async function resolveApiBase() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("api")) return params.get("api").replace(/\/$/, "");
      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        return window.location.origin;
      }
      for (const port of [5050, 5000, 5001, 8080]) {
        const base = `http://127.0.0.1:${port}`;
        try {
          const r = await fetch(`${base}/api/health`, { signal: AbortSignal.timeout(2000) });
          const d = await r.json();
          if (r.ok && d.success) return base;
        } catch (_) {}
      }
      return "http://127.0.0.1:5050";
    }

    const ordersBody = document.getElementById("orders-body");
    const orderCount = document.getElementById("order-count");
    const lastUpdated = document.getElementById("last-updated");
    const errorBanner = document.getElementById("error-banner");
    const apiFoot = document.getElementById("api-foot");

    apiFoot.textContent = `جاري الاتصال…`;

    function normalizeWhatsAppPhone(phone) {
      if (!phone || phone === "N/A") return null;
      const digits = String(phone).replace(/\D/g, "");
      if (digits.length < 8) return null;
      return digits;
    }

    function buildWhatsAppMessage(order) {
      return [
        `Hello ${order.customer_name || "there"},`,
        "",
        "Your delivery order details:",
        `Invoice: ${order.invoice_number || "—"}`,
        `Driver: ${order.driver_name || "—"} (${order.driver_phone || "—"})`,
        `Status: ${order.status || "pending"}`,
        "",
        "Thank you!",
      ].join("\n");
    }

    function whatsAppUrl(order) {
      const phone = normalizeWhatsAppPhone(order.customer_phone);
      if (!phone) return null;
      const text = encodeURIComponent(buildWhatsAppMessage(order));
      return `https://wa.me/${phone}?text=${text}`;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }

    function renderOrders(orders) {
      orderCount.textContent = orders.length;

      if (!orders.length) {
        ordersBody.innerHTML = `
          <tr>
            <td colspan="6" class="empty">No orders yet. Drivers can scan invoices from the driver app.</td>
          </tr>`;
        return;
      }

      ordersBody.innerHTML = orders
        .map((order) => {
          const waUrl = whatsAppUrl(order);
          const actionCell = waUrl
            ? `<a class="btn-wa" href="${waUrl}" target="_blank" rel="noopener noreferrer">Send WhatsApp</a>`
            : `<button type="button" class="btn-wa disabled" disabled title="Invalid phone">Send WhatsApp</button>`;

          return `
            <tr>
              <td class="invoice-cell">${escapeHtml(order.invoice_number)}</td>
              <td>${escapeHtml(order.customer_name)}</td>
              <td>${escapeHtml(order.customer_phone)}</td>
              <td>${escapeHtml(order.driver_name)}</td>
              <td>${escapeHtml(order.driver_phone)}</td>
              <td>${actionCell}</td>
            </tr>`;
        })
        .join("");
    }

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.classList.remove("hidden");
    }

    function hideError() {
      errorBanner.classList.add("hidden");
    }

    async function fetchOrders() {
      const res = await fetch(`${API_BASE}/api/restaurant/orders`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) {
        throw new Error(data.error || `Failed to load orders (${res.status})`);
      }
      return data.orders || [];
    }

    async function refresh() {
      try {
        const orders = await fetchOrders();
        renderOrders(orders);
        hideError();
        lastUpdated.textContent = new Date().toLocaleString();
      } catch (err) {
        showError(err.message);
        document.getElementById("live-label").textContent = "Offline";
      }
    }

    (async function start() {
      API_BASE = await resolveApiBase();
      apiFoot.textContent = `${API_BASE} · تحديث كل ${POLL_MS / 1000} ث`;
      await refresh();
      setInterval(refresh, POLL_MS);
    })();
  </script>
</body>
</html>
