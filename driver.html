<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Driver — Invoice Scan</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
    }

    .app {
      max-width: 420px;
      margin: 0 auto;
      padding: 1.25rem 1rem 2rem;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 0.5rem 0 1.25rem;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      flex: 1;
    }

    .hidden { display: none !important; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="tel"],
    input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 0;
      border-color: transparent;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.9rem 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:not(:disabled):hover { background: var(--accent-hover); }

    .btn-success { background: var(--success); color: #052e16; margin-top: 0.75rem; }
    .btn-success:not(:disabled):hover { filter: brightness(1.08); }

    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .btn-outline:hover { color: var(--text); border-color: var(--muted); }

    .welcome {
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .welcome h2 { font-size: 1.2rem; }
    .welcome span { color: var(--accent); }

    .scan-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1.5rem 1rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .scan-zone p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }

    .preview-wrap {
      margin-top: 1rem;
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .preview-wrap img {
      display: block;
      width: 100%;
      max-height: 280px;
      object-fit: contain;
    }

    .preview-label {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.5rem 0.75rem;
    }

    #file-input { display: none; }

    .alert {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid var(--danger);
      color: #fecaca;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid var(--success);
      color: #bbf7d0;
    }

    .spinner {
      width: 1.1rem;
      height: 1.1rem;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .api-hint {
      margin-top: auto;
      padding-top: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      word-break: break-all;
    }

    .orders-section {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .orders-section h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .order-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }

    .order-card.past {
      opacity: 0.85;
    }

    .order-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .order-invoice {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--accent);
      font-family: ui-monospace, monospace;
    }

    .order-meta {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .order-meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .btn-delivered {
      margin-top: 0.65rem;
      width: 100%;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--success);
      color: #052e16;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s, opacity 0.15s;
    }

    .btn-delivered:hover:not(:disabled) { filter: brightness(1.06); }
    .btn-delivered:disabled { opacity: 0.55; cursor: wait; }

    .orders-empty {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      padding: 0.75rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Delivery Driver</h1>
      <p>Scan invoices and send to restaurant</p>
    </header>

    <!-- Login -->
    <section id="login-view" class="card">
      <form id="login-form">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 555 123 4567" autocomplete="tel" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required />

        <button type="submit" class="btn btn-primary" id="login-btn">Sign in</button>
      </form>
      <div id="login-alert" class="alert alert-error hidden" role="alert"></div>
    </section>

    <!-- Driver app -->
    <section id="app-view" class="card hidden">
      <div class="welcome">
        <h2>Welcome, <span id="driver-name">Driver</span></h2>
      </div>

      <div class="scan-zone">
        <p>Capture or choose an invoice photo</p>
        <button type="button" class="btn btn-primary" id="scan-btn">Scan Invoice</button>
        <input type="file" id="file-input" accept="image/*" capture="camera" />
      </div>

      <div id="preview-section" class="preview-wrap hidden">
        <img id="preview-img" alt="Invoice preview" />
        <div class="preview-label">Invoice preview</div>
      </div>

      <button type="button" class="btn btn-success hidden" id="send-btn" disabled>
        Send to Restaurant
      </button>

      <div class="orders-section">
        <h3>الطلبات الحالية</h3>
        <div id="current-orders" class="orders-list" aria-live="polite"></div>
      </div>

      <div class="orders-section">
        <h3>الطلبات السابقة</h3>
        <div id="past-orders" class="orders-list" aria-live="polite"></div>
      </div>

      <button type="button" class="btn btn-outline" id="logout-btn">Sign out</button>

      <div id="app-alert" class="alert hidden" role="alert"></div>
    </section>

    <p class="api-hint" id="api-hint">جاري الاتصال بالسيرفر…</p>
  </div>

  <script>
    const STORAGE_TOKEN = "delivery_driver_token";
    const STORAGE_DRIVER = "delivery_driver";

    let API_BASE = "";

    async function resolveApiBase() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("api")) return params.get("api").replace(/\/$/, "");
      if (window.location.protocol === "http:" || window.location.protocol === "https:") {
        return window.location.origin;
      }
      for (const port of [5050, 5051, 5052, 5000, 5001, 8080]) {
        const base = `http://127.0.0.1:${port}`;
        try {
          const r = await fetch(`${base}/api/health`, { signal: AbortSignal.timeout(2000) });
          const d = await r.json();
          if (r.ok && d.success) return base;
        } catch (_) { /* try next port */ }
      }
      return "http://127.0.0.1:5050";
    }

    async function connectToServer() {
      if (window.location.protocol === "file:") {
        showAlert(
          loginAlert,
          "لا تفتح driver.html من المستكشف مباشرة. شغّل start.bat ثم افتح الرابط الذي يظهر في الطرفية.",
          "error"
        );
      }
      API_BASE = await resolveApiBase();
      try {
        const r = await fetch(`${API_BASE}/api/health`, { signal: AbortSignal.timeout(5000) });
        const d = await r.json();
        if (!r.ok || !d.success) throw new Error("health failed");
        apiHint.textContent = `متصل — ${API_BASE}`;
        apiHint.style.color = "#86efac";
        return true;
      } catch (_) {
        apiHint.textContent = `غير متصل — شغّل start.bat (${API_BASE})`;
        apiHint.style.color = "#fca5a5";
        showAlert(
          loginAlert,
          "السيرفر غير شغّال. انقر مرتين على start.bat في مجلد المشروع، ثم حدّث الصفحة.",
          "error"
        );
        return false;
      }
    }

    const loginView = document.getElementById("login-view");
    const appView = document.getElementById("app-view");
    const loginForm = document.getElementById("login-form");
    const loginBtn = document.getElementById("login-btn");
    const loginAlert = document.getElementById("login-alert");
    const appAlert = document.getElementById("app-alert");
    const driverNameEl = document.getElementById("driver-name");
    const scanBtn = document.getElementById("scan-btn");
    const fileInput = document.getElementById("file-input");
    const previewSection = document.getElementById("preview-section");
    const previewImg = document.getElementById("preview-img");
    const sendBtn = document.getElementById("send-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const apiHint = document.getElementById("api-hint");
    const currentOrdersEl = document.getElementById("current-orders");
    const pastOrdersEl = document.getElementById("past-orders");

    let selectedFile = null;
    let previewObjectUrl = null;
    let serverOnline = false;
    let currentOrders = [];
    let pastOrders = [];

    function getToken() {
      return localStorage.getItem(STORAGE_TOKEN);
    }

    function getDriver() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_DRIVER) || "null");
      } catch {
        return null;
      }
    }

    function saveSession(token, driver) {
      localStorage.setItem(STORAGE_TOKEN, token);
      localStorage.setItem(STORAGE_DRIVER, JSON.stringify(driver));
    }

    function clearSession() {
      localStorage.removeItem(STORAGE_TOKEN);
      localStorage.removeItem(STORAGE_DRIVER);
    }

    function showAlert(el, message, type) {
      el.textContent = message;
      el.className = `alert alert-${type}`;
      el.classList.remove("hidden");
    }

    function hideAlert(el) {
      el.classList.add("hidden");
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }

    function formatOrderMeta(order) {
      return `
        <div><strong>العميل:</strong> ${escapeHtml(order.customer_name)}</div>
        <div><strong>الهاتف:</strong> ${escapeHtml(order.customer_phone)}</div>
      `;
    }

    function renderOrderCard(order, { showDelivered }) {
      const id = Number(order.id);
      return `
        <article class="order-card${showDelivered ? "" : " past"}" data-order-id="${id}">
          <div class="order-card-head">
            <span class="order-invoice">#${escapeHtml(order.invoice_number)}</span>
          </div>
          <div class="order-meta">${formatOrderMeta(order)}</div>
          ${showDelivered ? `<button type="button" class="btn-delivered" data-complete="${id}">تم التسليم</button>` : ""}
        </article>
      `;
    }

    function bindDeliveredButtons(container) {
      container.querySelectorAll("[data-complete]").forEach((btn) => {
        btn.addEventListener("click", () => completeOrder(Number(btn.dataset.complete)));
      });
    }

    function renderOrdersLists() {
      if (!currentOrders.length) {
        currentOrdersEl.innerHTML = '<p class="orders-empty">لا توجد فواتير نشطة — امسح فاتورة جديدة أعلاه</p>';
      } else {
        currentOrdersEl.innerHTML = currentOrders
          .map((o) => renderOrderCard(o, { showDelivered: true }))
          .join("");
        bindDeliveredButtons(currentOrdersEl);
      }

      if (!pastOrders.length) {
        pastOrdersEl.innerHTML = '<p class="orders-empty">لا توجد طلبات مكتملة بعد</p>';
      } else {
        pastOrdersEl.innerHTML = pastOrders
          .map((o) => renderOrderCard(o, { showDelivered: false }))
          .join("");
      }
    }

    function addToCurrentOrders(order) {
      if (!order?.id) return;
      const exists = currentOrders.some((o) => Number(o.id) === Number(order.id));
      if (!exists) currentOrders.unshift(order);
      renderOrdersLists();
    }

    function moveOrderToPast(orderId) {
      const id = Number(orderId);
      const idx = currentOrders.findIndex((o) => Number(o.id) === id);
      if (idx === -1) return;
      const [order] = currentOrders.splice(idx, 1);
      order.status = "completed";
      pastOrders.unshift(order);
      renderOrdersLists();
    }

    async function apiFetchDriverOrders() {
      const token = getToken();
      const res = await fetch(`${API_BASE}/api/driver/orders`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) {
        throw new Error(data.error || `Failed to load orders (${res.status})`);
      }
      return data;
    }

    async function loadDriverOrders() {
      try {
        const data = await apiFetchDriverOrders();
        currentOrders = data.current || [];
        pastOrders = data.past || [];
        renderOrdersLists();
      } catch (err) {
        if (err.message.includes("401") || /token|auth/i.test(err.message)) {
          clearSession();
          showLogin();
          showAlert(loginAlert, "انتهت الجلسة. سجّل الدخول مرة أخرى.", "error");
        } else {
          showAlert(appAlert, err.message, "error");
        }
      }
    }

    async function completeOrder(orderId) {
      const btn = currentOrdersEl.querySelector(`[data-complete="${orderId}"]`);
      if (btn) {
        btn.disabled = true;
        btn.textContent = "جاري التحديث…";
      }

      try {
        const token = getToken();
        const res = await fetch(`${API_BASE}/api/order/complete/${orderId}`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.success) {
          throw new Error(data.error || `Failed (${res.status})`);
        }
        moveOrderToPast(orderId);
        hideAlert(appAlert);
      } catch (err) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = "تم التسليم";
        }
        showAlert(appAlert, err.message || "تعذّر تحديث الطلب", "error");
      }
    }

    function showApp(driver) {
      loginView.classList.add("hidden");
      appView.classList.remove("hidden");
      driverNameEl.textContent = driver.name || "Driver";
      hideAlert(loginAlert);
      hideAlert(appAlert);
      loadDriverOrders();
    }

    function showLogin() {
      appView.classList.add("hidden");
      loginView.classList.remove("hidden");
      resetImageSelection();
      currentOrders = [];
      pastOrders = [];
    }

    function resetImageSelection() {
      selectedFile = null;
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = null;
      }
      previewSection.classList.add("hidden");
      previewImg.removeAttribute("src");
      sendBtn.classList.add("hidden");
      sendBtn.disabled = true;
      fileInput.value = "";
    }

    function setSendLoading(loading) {
      if (loading) {
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<span class="spinner"></span> Processing with AI…';
      } else {
        sendBtn.disabled = !selectedFile;
        sendBtn.textContent = "Send to Restaurant";
      }
    }

    async function apiLogin(phone, password) {
      const res = await fetch(`${API_BASE}/api/driver/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone, password }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) {
        throw new Error(data.error || `Login failed (${res.status})`);
      }
      return data;
    }

    async function apiUpload(file) {
      const token = getToken();
      const form = new FormData();
      form.append("image", file, file.name || "invoice.jpg");

      const res = await fetch(`${API_BASE}/api/driver/upload`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}` },
        body: form,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) {
        throw new Error(data.error || `Upload failed (${res.status})`);
      }
      return data;
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert(loginAlert);
      if (!serverOnline) {
        showAlert(loginAlert, "شغّل السيرفر أولاً (start.bat) ثم حدّث الصفحة.", "error");
        return;
      }
      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in…";

      try {
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value;
        const data = await apiLogin(phone, password);
        saveSession(data.token, data.driver);
        showApp(data.driver);
      } catch (err) {
        const msg = err.message.includes("Failed to fetch")
          ? "تعذّر الاتصال بالسيرفر. تأكد من تشغيل start.bat."
          : err.message;
        showAlert(loginAlert, msg, "error");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Sign in";
      }
    });

    scanBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", () => {
      const file = fileInput.files?.[0];
      if (!file) return;

      if (!file.type.startsWith("image/")) {
        showAlert(appAlert, "Please select an image file.", "error");
        return;
      }

      selectedFile = file;
      if (previewObjectUrl) URL.revokeObjectURL(previewObjectUrl);
      previewObjectUrl = URL.createObjectURL(file);
      previewImg.src = previewObjectUrl;
      previewSection.classList.remove("hidden");
      sendBtn.classList.remove("hidden");
      sendBtn.disabled = false;
      hideAlert(appAlert);
    });

    sendBtn.addEventListener("click", async () => {
      if (!selectedFile) return;
      hideAlert(appAlert);
      setSendLoading(true);

      try {
        const data = await apiUpload(selectedFile);
        const ex = data.extracted || {};
        if (data.order) {
          addToCurrentOrders(data.order);
        } else if (data.order_id) {
          addToCurrentOrders({
            id: data.order_id,
            invoice_number: ex.invoice_number,
            customer_name: ex.customer_name,
            customer_phone: ex.customer_phone,
            status: "pending",
          });
        }
        showAlert(
          appAlert,
          `تم الإرسال — فاتورة #${ex.invoice_number || "—"} · ${ex.customer_name || "عميل"}`,
          "success"
        );
        resetImageSelection();
      } catch (err) {
        if (err.message.includes("401") || /token|auth/i.test(err.message)) {
          clearSession();
          showLogin();
          showAlert(loginAlert, "انتهت الجلسة. سجّل الدخول مرة أخرى.", "error");
        } else {
          showAlert(appAlert, err.message, "error");
        }
      } finally {
        setSendLoading(false);
      }
    });

    logoutBtn.addEventListener("click", () => {
      clearSession();
      showLogin();
    });

    (async function init() {
      serverOnline = await connectToServer();
      const token = getToken();
      const driver = getDriver();
      if (token && driver && serverOnline) {
        showApp(driver);
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
